# See https://prek.j178.dev for more information
# Migrated from pre-commit to prek: https://prek.j178.dev/benchmark/
#
# Install prek itself:
#   $ cargo install prek
#     OR
#   $ brew install prek
#
# Update all prek hooks to latest version:
#   $ prek auto-update
#
# Install all default prek hooks locally:
#   $ prek install
#
# Apply a given prek hook to all files:
#   $ prek run --all-files <id>
#
# Apply all prek hooks to all files:
#   $ prek run --all-files
ci:
  autoupdate_schedule: monthly
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      # keep-sorted start
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-aws-credentials
        args:
          - --allow-missing-credentials
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: pretty-format-json
        args:
          - --autofix
          - --no-sort-keys
      - id: trailing-whitespace
        # keep-sorted end
  # keep-sorted start
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # frozen: v2.4.2
    hooks:
      - id: codespell
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # frozen: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/golangci/misspell
    rev: b565578a5ec9b815331bdae8f588021f7696ec6f # frozen: v0.8.0
    hooks:
      - id: misspell
  - repo: https://github.com/google/keep-sorted
    rev: 339d935575ef7d92f2c9b4df9ce4b724d73c9201 # frozen: v0.9.1
    hooks:
      - id: keep-sorted
  - repo: https://github.com/google/yamlfmt
    rev: 21ca5323a9c87ee37a434e0ca908efc0a89daa07 # frozen: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338 # frozen: v0.49.0
    hooks:
      - id: markdownlint
        args:
          - --config=.markdownlintrc.json
  - repo: https://github.com/rhysd/actionlint/
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815 # frozen: v1.26.1
    hooks:
      - id: zizmor
  - repo: local
    hooks:
      - id: prek
        name: Validate prek config
        entry: sh -c 'command -v prek >/dev/null 2>&1 && prek validate-config || pre-commit validate-config'
        pass_filenames: false
        language: system
        files: ^.pre-commit-config.yaml$
# keep-sorted end
